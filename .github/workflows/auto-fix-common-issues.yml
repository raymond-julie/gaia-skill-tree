name: Auto-fix common issues

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-and-comment:
    name: Scan for fixable issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for banned synonyms
        id: banned-synonyms
        run: |
          set +e
          HITS=$(grep -RnE \
               '\b(legendary skill|Pure \/ Undeveloped|Unwired Basics|Atomic Basics|graph-isolated singularities|Highest Tier:\s*common|top-tier skill|mythic|Undeveloped\b)\b' \
               docs/ scripts/ src/gaia_cli/ \
               --exclude='STEWARDSHIP_PLAN.md' \
               --exclude='WHY-GAIA.md' \
               --exclude='QUICKSTART.md' \
               --exclude-dir='archive' \
               --exclude-dir='samples' \
               2>/dev/null || true)

          if [ -n "$HITS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "hits<<EOF" >> $GITHUB_OUTPUT
            echo "$HITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on banned synonyms
        if: steps.banned-synonyms.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          HITS_OUTPUT: ${{ steps.banned-synonyms.outputs.hits }}
        with:
          script: |
            const marker = '<!-- auto-fix-bot: banned-synonyms -->';
            const hits = process.env.HITS_OUTPUT;
            const body = `${marker}\n## ⚠️ Banned synonyms detected\n\nSee CONTEXT.md § Banned synonyms for replacements:\n\n\`\`\`\n${hits}\n\`\`\`\n\nPlease update these before merge.`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Check for hardcoded colors
        id: hardcoded-colors
        run: |
          set +e
          HITS=$(grep -REn '#(38bdf8|c084fc|f59e0b|7c3aed|fbbf24|94a3b8|63cab7|a78bfa|e879f9)' \
               docs/js/ docs/css/ \
               --include='*.js' --include='*.css' \
               --exclude-dir='archive' \
               2>/dev/null | grep -v 'var(--[^,]*,' || true)

          if [ -n "$HITS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "hits<<EOF" >> $GITHUB_OUTPUT
            echo "$HITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on hardcoded colors
        if: steps.hardcoded-colors.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          HITS_OUTPUT: ${{ steps.hardcoded-colors.outputs.hits }}
        with:
          script: |
            const marker = '<!-- auto-fix-bot: hardcoded-colors -->';
            const hits = process.env.HITS_OUTPUT;
            const body = `${marker}\n## 🎨 Hardcoded colors detected\n\nUse design tokens from \`docs/css/tokens.css\` instead:\n\n\`\`\`\n${hits}\n\`\`\`\n\nReplace with \`var(--token-name)\`.`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Check for unlabeled ascending sorts
        id: unlabeled-sorts
        run: |
          set +e
          HITS=$(grep -RnE 'levels?\.sort\(.*a\s*-\s*b|sortBy.*level.*asc' \
               docs/js/ scripts/ \
               --include='*.js' --include='*.py' \
               2>/dev/null | grep -v 'data-pattern.*journey' || true)

          if [ -n "$HITS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "hits<<EOF" >> $GITHUB_OUTPUT
            echo "$HITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on unlabeled sorts
        if: steps.unlabeled-sorts.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          HITS_OUTPUT: ${{ steps.unlabeled-sorts.outputs.hits }}
        with:
          script: |
            const marker = '<!-- auto-fix-bot: unlabeled-sorts -->';
            const hits = process.env.HITS_OUTPUT;
            const body = `${marker}\n## 📊 Unlabeled ascending-level sorts\n\nAll skill lists default to Ultimate-first (descending). If a journey/progression sort is intentional, add a comment:\n\n\`\`\`javascript\n// data-pattern="journey"\nsortBy(...)\n\`\`\`\n\nFound in:\n\`\`\`\n${hits}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
