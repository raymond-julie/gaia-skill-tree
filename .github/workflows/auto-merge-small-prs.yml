name: Auto-merge small PRs

on:
  pull_request:
    types: [opened, reopened, labeled, ready_for_review]

# Cancel any in-progress run for the same PR when a new one starts.
# This prevents a queue of stale runs from piling up and spamming notifications.
concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Auto-merge if eligible
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size and eligibility
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count changed files against base branch
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
 
          # Auto-merge is safe if:
          # 1. PR has 'auto-merge' label OR is a bot PR (Jules/Codex)
          # 2. Fewer than 20 files changed
          # 3. Doesn't modify critical files (.github, pyproject.toml, package.json)
 
          # Fetch labels and body to check for eligibility
          PR_DATA=$(gh pr view ${{ github.event.pull_request.number }} --json labels,body)
          HAS_LABEL=$(echo "$PR_DATA" | jq -r '.labels[].name' | grep -q "auto-merge" && echo "true" || echo "false")
          IS_BOT=$(echo "$PR_DATA" | jq -r '.body' | grep -E '(jules\.google\.com/task|chatgpt\.com/codex)' > /dev/null && echo "true" || echo "false")
 
          if [ "$HAS_LABEL" != "true" ] && [ "$IS_BOT" != "true" ]; then
            echo "eligible=false" >> $GITHUB_OUTPUT
            echo "Skipping auto-merge: PR lacks 'auto-merge' label and bot signature"
            exit 0
          fi
 
          if [ "$CHANGED_FILES" -lt 20 ]; then
            CRITICAL_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '(^\.github/|^pyproject\.toml|package\.json|package-lock\.json)' || true)
            if [ -z "$CRITICAL_FILES" ]; then
              echo "eligible=true" >> $GITHUB_OUTPUT
            else
              echo "eligible=false" >> $GITHUB_OUTPUT
              echo "Skipping auto-merge: PR modifies critical files"
            fi
          else
            echo "eligible=false" >> $GITHUB_OUTPUT
            echo "Skipping auto-merge: PR changes $CHANGED_FILES files (limit: 20)"
          fi
 
      - name: Wait for checks and update body
        if: steps.check.outputs.eligible == 'true'
        run: |
          # Poll for checks to complete (max 10 min: 60 rounds * 10 seconds)
          SUCCESS=false
          for i in {1..60}; do
            CHECKS_JSON=$(gh pr checks ${{ github.event.pull_request.number }} --json state || echo "[]")
            TOTAL_COUNT=$(echo "$CHECKS_JSON" | jq '. | length')
            
            if [ "$TOTAL_COUNT" -eq 0 ]; then
              echo "Waiting for checks to be registered... ($i/60)"
              sleep 10
              continue
            fi
            
            PENDING_COUNT=$(echo "$CHECKS_JSON" | jq '[.[] | select(.state == "PENDING")] | length')
            FAILED_COUNT=$(echo "$CHECKS_JSON" | jq '[.[] | select(.state == "FAILING" or .state == "CANCELLED")] | length')
            
            echo "Checks check: total=$TOTAL_COUNT, pending=$PENDING_COUNT, failed=$FAILED_COUNT ($i/60)"
            
            if [ "$PENDING_COUNT" -eq 0 ]; then
              if [ "$FAILED_COUNT" -eq 0 ]; then
                SUCCESS=true
                echo "All checks completed successfully!"
              else
                echo "Some checks failed ($FAILED_COUNT failed). Aborting auto-merge."
              fi
              break
            fi
            
            sleep 10
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Checks failed or timed out. Aborting."
            exit 1
          fi
 
          # Update PR body with [skip-gen] marker
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          if ! echo "$BODY" | grep -q "\[skip-gen\]"; then
            NEW_BODY="$(printf '%s\n\n[skip-gen]' "$BODY")"
            gh pr edit ${{ github.event.pull_request.number }} --body "$NEW_BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Merge PR
        if: steps.check.outputs.eligible == 'true'
        run: |
          # If it's a draft, mark as ready first
          IS_DRAFT=$(gh pr view ${{ github.event.pull_request.number }} --json isDraft -q .isDraft)
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready ${{ github.event.pull_request.number }}
          fi
 
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch || echo "PR already merged or merge blocked by checks"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
