name: Backfill Missing Releases

# One-time workflow: trigger manually from the Actions tab to retroactively
# create git tags and GitHub Releases for every version that was bumped in
# the manifests but never tagged/released.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    name: Create missing tags and releases
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tags and releases for all missing versions
        run: |
          # Format: VERSION COMMIT_HASH
          # Ordered oldest → newest so release notes are generated correctly.
          cat <<'EOF' > /tmp/versions.txt
