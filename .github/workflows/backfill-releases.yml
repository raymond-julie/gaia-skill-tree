name: Backfill Missing Releases

# Reconciler: create a GitHub Release for every `v*` tag that has a tag but no
# corresponding Release. Auto-discovers the gap (no hardcoded list), so it stays
# useful forever — trigger it any time releases drift behind tags.
#
# Why this is needed: version tags are pushed by automation, but a tag push made
# by a token that does not trigger workflows will never invoke `release.yml`.
# This workflow closes that gap by creating the Release directly via the API
# (GITHUB_TOKEN can create releases; it just cannot *trigger* other workflows).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List missing releases without creating them'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backfill:
    name: Create releases for all tags missing one
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create missing releases
        run: |
          set -euo pipefail

          # Enumerate all semver tags from the remote, oldest → newest, so
          # generated release notes diff against the correct previous tag.
          mapfile -t TAGS < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/tags" -q '.[].name' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V
          )

          if [ "${#TAGS[@]}" -eq 0 ]; then
            echo "No semver tags found. Nothing to do."
            exit 0
          fi

          LATEST="${TAGS[-1]}"
          echo "Found ${#TAGS[@]} tags. Latest: ${LATEST}"
          echo ""

          CREATED=0
          SKIPPED=0
          FAILED=0

          for tag in "${TAGS[@]}"; do
            if gh release view "$tag" --json tagName -q .tagName &>/dev/null; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if [ "${DRY_RUN}" = "true" ]; then
              echo "[would-create] $tag"
              CREATED=$((CREATED + 1))
              continue
            fi

            LATEST_FLAG="--latest=false"
            [ "$tag" = "$LATEST" ] && LATEST_FLAG="--latest"

            echo "[create] $tag"
            if gh release create "$tag" \
                --title "$tag" \
                --generate-notes \
                $LATEST_FLAG; then
              CREATED=$((CREATED + 1))
            else
              echo "::warning::Failed to create release for $tag"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== Backfill complete ==="
          echo "Created (or would-create):  $CREATED"
          echo "Skipped (already present):  $SKIPPED"
          echo "Failed:                     $FAILED"
          [ "$FAILED" -gt 0 ] && exit 1 || exit 0
