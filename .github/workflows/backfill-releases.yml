          LATEST_TAG="v3.23.9"
          CREATED=0
          SKIPPED=0
          FAILED=0

          while read -r tag commit; do
            [ -z "$tag" ] && continue

            if gh release view "$tag" --json tagName -q .tagName &>/dev/null; then
              echo "[skip]  $tag already has a release"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "[create] $tag @ ${commit:0:8}"

            LATEST_FLAG="--latest=false"
            [ "$tag" = "$LATEST_TAG" ] && LATEST_FLAG="--latest"

            if gh release create "$tag" \
                --target "$commit" \
                --title "$tag" \
                --generate-notes \
                $LATEST_FLAG; then
              echo "[ok]    $tag created"
              CREATED=$((CREATED + 1))
            else
              echo "[fail]  $tag failed"
              FAILED=$((FAILED + 1))
            fi
          done < /tmp/versions.txt

          echo ""
          echo "=== Backfill complete ==="
          echo "Created:  $CREATED"
          echo "Skipped:  $SKIPPED"
          echo "Failed:   $FAILED"
          [ "$FAILED" -gt 0 ] && exit 1 || exit 0
