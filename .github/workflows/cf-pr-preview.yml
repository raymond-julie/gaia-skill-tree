name: CF PR Preview (Worker)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

# ── What this workflow does ────────────────────────────────────────────────────
# Deploys a Cloudflare Worker with Static Assets (wrangler deploy) to a
# workers.dev preview URL for manual PR inspection.
#
# This is NOT the production deploy. Production is:
#   GitHub Pages (serving docs/ from main branch) → Cloudflare CDN (DNS proxy)
#
# The Worker (worker/index.js) handles badge ?repo= validation for previews.
# For production, badges are validated by the same Worker logic but deployed
# separately. Static assets including docs/api/v1/ are served by GitHub Pages.
#
# Trigger: workflow_dispatch only (manual). Supply the branch name to preview.
# ──────────────────────────────────────────────────────────────────────────────

permissions:
  contents: read
  # If this workflow ever migrates to OIDC-based auth (e.g. wrangler-action
  # token federation or any action calling core.getIDToken()), add:
  #   id-token: write
  # Without it GitHub silently returns an empty token and the deploy fails
  # inside the action at token-exchange time, not on this line. Not needed
  # while CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets are used.
  # See issue #467.

jobs:
  deploy:
    name: Deploy PR Preview to Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler so the deploy uses a version that honours
          # [assets] run_worker_first (the badge ?repo= validator in
          # worker/index.js). The action's default wrangler was too old to
          # apply it, so the worker only ran as the no-asset fallback and
          # real badges bypassed validation.
          wranglerVersion: "4.95.0"
          command: deploy --minify
