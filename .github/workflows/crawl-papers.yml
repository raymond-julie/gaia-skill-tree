name: "Papers Crawl"

on:
  schedule:
    - cron: "0 6 * * 0"  # Sunday 6am UTC (weekly)
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run Papers crawler
        run: python scripts/crawlers/papers/crawler.py

      - name: Check for proposals
        id: check
        run: |
          if [ -d proposals ] && [ "$(ls proposals/papers-*.json 2>/dev/null)" ]; then
            echo "has_proposals=true" >> $GITHUB_OUTPUT
          else
            echo "has_proposals=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.check.outputs.has_proposals == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "mbtiongson1"
          git config --global user.email "marco.tngsn@gmail.com"

          DATE=$(date +%Y-%m-%d)
          BRANCH="bot/papers/$DATE"
          git checkout -b "$BRANCH"
          git add proposals/
          git commit -m "[bot] Upgrade evidence from papers ($DATE)"
          git push origin "$BRANCH"

          gh label create "bot-proposal" --color "0E8A16" --description "Automated crawler proposal" --force
          gh label create "evidence-upgrade" --color "FBCA04" --description "Evidence upgrade proposal" --force
          gh label create "source:papers" --color "5319E7" --description "Proposal from papers crawler" --force

          gh pr create \
            --title "[bot] Upgrade evidence from papers ($DATE)" \
            --body "Auto-generated by papers crawler. Proposes Class A evidence upgrades for existing skills." \
            --label "bot-proposal" \
            --label "evidence-upgrade" \
            --label "source:papers"
