name: Docs Cohesion Guards

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - 'claude/**'
      - 'gemini/**'
      - 'design/**'
      - 'docs/**'
      - 'dev/**'

jobs:
  cohesion:
    name: Design-system lint guards
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.changed_files >= 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Guard A — Token-only colour enforcement ──────────────────────────
      - name: Guard A — Scan for hardcoded colors
        id: hardcoded-colors
        run: |
          set +e
          HITS=$(grep -REn '#(38bdf8|c084fc|f59e0b|7c3aed|fbbf24|94a3b8|63cab7|a78bfa|e879f9)' \
               docs/js/ docs/css/ \
               --include='*.js' --include='*.css' \
               --exclude-dir='archive' \
               2>/dev/null | grep -v 'var(--[^,]*,' || true)

          if [ -n "$HITS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "hits<<EOF" >> $GITHUB_OUTPUT
            echo "$HITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Guard A — Comment on hardcoded colors
        if: steps.hardcoded-colors.outputs.found == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HITS_OUTPUT: ${{ steps.hardcoded-colors.outputs.hits }}
        with:
          script: |
            const marker = '<!-- auto-fix-bot: hardcoded-colors -->';
            const hits = process.env.HITS_OUTPUT;
            const body = `${marker}\n## 🎨 Hardcoded colors detected\n\nUse design tokens from \`docs/css/tokens.css\` instead:\n\n\`\`\`\n${hits}\n\`\`\`\n\nReplace with \`var(--token-name)\`.`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      # ── Guard B — Banned synonyms (per CONTEXT.md) ───────────────────────
      - name: Guard B — Scan for banned synonyms
        id: banned-synonyms
        run: |
          set +e
          HITS=$(grep -RnE \
               '\b(legendary skill|Pure \/ Undeveloped|Unwired Basics|Atomic Basics|graph-isolated singularities|Highest Tier:\s*common|top-tier skill|mythic|Undeveloped\b)\b' \
               docs/ scripts/ src/gaia_cli/ \
               --exclude='STEWARDSHIP_PLAN.md' \
               --exclude='WHY-GAIA.md' \
               --exclude='QUICKSTART.md' \
               --exclude-dir='archive' \
               --exclude-dir='samples' \
               2>/dev/null || true)

          if [ -n "$HITS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "hits<<EOF" >> $GITHUB_OUTPUT
            echo "$HITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Guard B — Comment on banned synonyms
        if: steps.banned-synonyms.outputs.found == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HITS_OUTPUT: ${{ steps.banned-synonyms.outputs.hits }}
        with:
          script: |
            const marker = '<!-- auto-fix-bot: banned-synonyms -->';
            const hits = process.env.HITS_OUTPUT;
            const body = `${marker}\n## ⚠️ Banned synonyms detected\n\nSee CONTEXT.md § Banned synonyms for replacements:\n\n\`\`\`\n${hits}\n\`\`\`\n\nPlease update these before merge.`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      # ── Guard C — Direction rule (Ultimate-first sort enforcement) ───────
      - name: Guard C — Scan for unlabeled sorts
        id: unlabeled-sorts
        run: |
          set +e
          HITS=$(grep -RnE 'levels?\.sort\(.*a\s*-\s*b|sortBy.*level.*asc' \
               docs/js/ scripts/ \
               --include='*.js' --include='*.py' \
               2>/dev/null | grep -v 'data-pattern.*journey' || true)

          if [ -n "$HITS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "hits<<EOF" >> $GITHUB_OUTPUT
            echo "$HITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Guard C — Comment on unlabeled sorts
        if: steps.unlabeled-sorts.outputs.found == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HITS_OUTPUT: ${{ steps.unlabeled-sorts.outputs.hits }}
        with:
          script: |
            const marker = '<!-- auto-fix-bot: unlabeled-sorts -->';
            const hits = process.env.HITS_OUTPUT;
            const body = `${marker}\n## 📊 Unlabeled ascending-level sorts\n\nAll skill lists default to Ultimate-first (descending). If a journey/progression sort is intentional, add a comment:\n\n\`\`\`javascript\n// data-pattern="journey"\nsortBy(...)\n\`\`\`\n\nFound in:\n\`\`\`\n${hits}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      # ── Final Status ─────────────────────────────────────────────────────
      - name: Verify all cohesion guards passed
        run: |
          FAILED=false
          if [ "${{ steps.hardcoded-colors.outputs.found }}" = "true" ]; then
            echo "❌ Guard A Failed: Hardcoded colors found."
            FAILED=true
          fi
          if [ "${{ steps.banned-synonyms.outputs.found }}" = "true" ]; then
            echo "❌ Guard B Failed: Banned synonyms found."
            FAILED=true
          fi
          if [ "${{ steps.unlabeled-sorts.outputs.found }}" = "true" ]; then
            echo "❌ Guard C Failed: Unlabeled ascending sorts found."
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            exit 1
          fi
          echo "✅ All cohesion guards passed."
