name: Gaia Generation Check

on:
  pull_request:
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'scripts/generateNamedIndex.py'
      - 'scripts/renderGraphSvg.py'
      - 'scripts/syncDocsGraphAssets.py'

jobs:
  generate:
    name: Projection Generation + Drift Detection
    runs-on: ubuntu-latest
    if: >-
      !startsWith(github.head_ref || '', 'cli/') &&
      !startsWith(github.head_ref || '', 'docs/') &&
      !startsWith(github.head_ref || '', 'design/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate Projections
        run: python scripts/generateProjections.py

      - name: Export GEXF
        run: python scripts/exportGexf.py

      - name: Render Graph SVG
        run: python scripts/renderGraphSvg.py --format svg

      - name: Generate Named Skills Index
        run: python scripts/generateNamedIndex.py

      - name: Sync docs assets
        run: python scripts/syncDocsGraphAssets.py

      - name: Check for Drift
        run: |
          git diff --exit-code || (echo "❌ Generated files differ from committed ones. Run scripts/generateProjections.py, scripts/exportGexf.py, scripts/renderGraphSvg.py, scripts/generateNamedIndex.py, and scripts/syncDocsGraphAssets.py locally and commit the changes." && exit 1)
