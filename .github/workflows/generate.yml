name: Gaia Generation Check

on:
  pull_request:
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'scripts/generateNamedIndex.py'

jobs:
  generate:
    name: Projection Generation + Drift Detection
    runs-on: ubuntu-latest
    if: >-
      !startsWith(github.head_ref || '', 'cli/') &&
      !startsWith(github.head_ref || '', 'docs/') &&
      !startsWith(github.head_ref || '', 'design/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Generate Projections
        run: python scripts/generateProjections.py

      - name: Export GEXF
        run: python scripts/exportGexf.py

      - name: Generate Named Skills Index
        run: python scripts/generateNamedIndex.py

      - name: Sync named-skills index to docs
        run: |
          mkdir -p docs/graph/named
          cp registry/named-skills.json docs/graph/named/index.json

      - name: Check for Drift
        run: |
          git diff --exit-code || (echo "❌ Generated files differ from committed ones. Run scripts/generateProjections.py, scripts/exportGexf.py, and scripts/generateNamedIndex.py locally and commit the changes." && exit 1)
