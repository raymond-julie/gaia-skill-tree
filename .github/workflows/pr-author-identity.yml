name: PR Author Identity

# Guard 1 (issue #986): verify every commit in a PR carries verified author
# identity. Blocks PRs where any commit has:
#   - author_login: null (i.e. commit not tied to a GitHub account)
#   - author.email ending in .local (personal-machine hostname, not verifiable)
#
# Merge commits (committer = GitHub via web-flow) get a pass since they're
# generated by the GitHub UI and have no independent author identity.
# Known trusted bot accounts are whitelisted.
#
# Skippable via the 'skip-author-identity-check' label for legitimate
# edge cases (e.g. historical import of externally-authored content that
# the maintainer has verified out-of-band).

on:
  pull_request:
    # 'labeled'/'unlabeled' are required so that applying the
    # 'skip-author-identity-check' bypass label re-triggers this workflow with
    # an event payload that actually contains the label. Without them, adding
    # the label has no effect (re-runs reuse the original label-less payload).
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  verify-author-identity:
    name: Verify commit authors are attributed
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.pull_request.labels.*.name, 'skip-author-identity-check')
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Check commit author identity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Whitelist of bot / infrastructure identities that pass the check
          # even though their commits may appear with special author_login handling.
          WHITELISTED_BOTS=(
            "github-actions[bot]"
            "dependabot[bot]"
            "web-flow"                # GitHub's merge-commit committer
            "renovate[bot]"
          )

          COMMITS_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --paginate)

          VIOLATIONS=""
          CHECKED=0
          PASSED=0

          # Process substitution avoids the subshell trap that would strip
          # $VIOLATIONS on `while | pipe` iteration.
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            CHECKED=$((CHECKED + 1))

            SHA=$(echo "$commit" | jq -r '.sha[0:9]')
            AUTHOR_LOGIN=$(echo "$commit" | jq -r '.author.login // "null"')
            AUTHOR_NAME=$(echo "$commit" | jq -r '.commit.author.name')
            AUTHOR_EMAIL=$(echo "$commit" | jq -r '.commit.author.email')
            COMMITTER_NAME=$(echo "$commit" | jq -r '.commit.committer.name')

            # Merge commits from GitHub UI: pass
            if [ "$COMMITTER_NAME" = "GitHub" ] && [ "$AUTHOR_LOGIN" != "null" ]; then
              echo "  ✓ $SHA — merge/authored via GitHub UI ($AUTHOR_LOGIN)"
              PASSED=$((PASSED + 1))
              continue
            fi

            # Whitelisted bots: pass
            WHITELISTED="false"
            for bot in "${WHITELISTED_BOTS[@]}"; do
              if [ "$AUTHOR_LOGIN" = "$bot" ] || [ "$AUTHOR_NAME" = "$bot" ]; then
                WHITELISTED="true"
                break
              fi
            done
            if [ "$WHITELISTED" = "true" ]; then
              echo "  ✓ $SHA — whitelisted bot ($AUTHOR_LOGIN)"
              PASSED=$((PASSED + 1))
              continue
            fi

            # Check 1: author_login must be non-null
            if [ "$AUTHOR_LOGIN" = "null" ]; then
              VIOLATIONS="${VIOLATIONS}\n  ❌ $SHA — unverified author identity\n     author.name  = $AUTHOR_NAME\n     author.email = $AUTHOR_EMAIL\n     GitHub API   = author_login: null (commit not tied to a GitHub account)"
              continue
            fi

            # Check 2: personal-hostname .local email domains fail
            if echo "$AUTHOR_EMAIL" | grep -qE '\.local$|\.localhost$|@[Mm]ac[Bb]ook'; then
              VIOLATIONS="${VIOLATIONS}\n  ❌ $SHA — commit author email uses a personal-machine hostname\n     author.name  = $AUTHOR_NAME\n     author.email = $AUTHOR_EMAIL\n     author_login = $AUTHOR_LOGIN\n     Personal .local hostnames aren't verifiable identity domains."
              continue
            fi

            echo "  ✓ $SHA — $AUTHOR_LOGIN <$AUTHOR_EMAIL>"
            PASSED=$((PASSED + 1))
          done < <(echo "$COMMITS_JSON" | jq -c '.[]')

          echo ""
          echo "Checked: $CHECKED commit(s); passed: $PASSED"

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "::error::PR contains commits with unverified author identity (issue #986 policy)"
            echo -e "$VIOLATIONS"
            echo ""
            echo "How to fix:"
            echo "  1. Amend the flagged commit(s) under your verified GitHub identity:"
            echo "       git commit --amend --reset-author --no-edit"
            echo "       git push --force-with-lease"
            echo "     (run from a machine logged into your GitHub account so the"
            echo "      commit's author.email resolves to your verified identity)"
            echo ""
            echo "  2. Or apply the 'skip-author-identity-check' label to bypass"
            echo "     (maintainer only; only for pre-verified out-of-band content)"
            exit 1
          fi

          echo ""
          echo "✓ All commits have verified author identity."
