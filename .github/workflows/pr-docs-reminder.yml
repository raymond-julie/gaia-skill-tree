name: PR Docs Reminder

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  repo-docs-before-pr:
    name: Repo Docs Before PR reminder
    runs-on: ubuntu-latest
    steps:
      - name: Remind contributors to check generated docs
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MD'
          ## Repo Docs Before PR

          Before review, run the generated-docs drift check:

          ```bash
          python scripts/build_docs.py --check
          ```

          If it reports drift, regenerate and commit the updated files:

          ```bash
          python scripts/build_docs.py
          ```
          MD

          echo "::notice title=Repo Docs Before PR::Run python scripts/build_docs.py --check before review. If it reports drift, run python scripts/build_docs.py and commit the updates."
