name: Publish gaia-cli to PyPI

# Triggers:
#   • push tag v*       — legacy path (only fires for human/PAT-pushed tags).
#   • workflow_dispatch — MANUAL PUBLISH. Actions tab → "Publish gaia-cli to
#     PyPI" → Run workflow, and pick the branch *or tag* to build from. It
#     builds whatever version is in pyproject.toml at that ref, so you can
#     publish a specific past version by selecting its tag (e.g. v3.30.0).
#   Automated production publishes are dispatched here by sync-artifacts.yml
#   on MAJOR bumps (see CONTEXT.md § Release Channels).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gaia-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install build

      - name: Clean local build artifacts
        run: rm -rf build dist *.egg-info src/*.egg-info

      - name: Bundle fresh registry snapshot (minor/major only)
        # Refresh the bundled data/ snapshot from the latest GitHub Release asset.
        # Only runs on vX.Y.0 tags (minor or major bumps); patch releases skip this
        # so the wheel inherits the snapshot from the most recent minor/major.
        # publish-pypi.yml is the correct place (not sync-artifacts.yml) because:
        #   • sync-artifacts.yml creates the release and tarball first;
        #   • publish-pypi.yml builds the PyPI wheel from a clean checkout, so the
        #     bundled data/ files must be injected HERE before python -m build runs.
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          # Only refresh on vX.Y.0 (minor or major: patch part is 0)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ "$PATCH" != "0" ]; then
            echo "Patch release v${VERSION} — skipping snapshot refresh (patch=${PATCH})."
            exit 0
          fi
          TAG="v${VERSION}"
          echo "Minor/major release ${TAG} — downloading gaia-artifacts.tar.gz..."
          gh release download "${TAG}" --pattern "gaia-artifacts.tar.gz" --dir /tmp/gaia-snap
          echo "Unpacking and refreshing bundled snapshot..."
          tar -xzf /tmp/gaia-snap/gaia-artifacts.tar.gz -C /tmp/gaia-snap
          rm -f  src/gaia_cli/data/registry/gaia.json
          rm -f  src/gaia_cli/data/registry/named-skills.json
          rm -rf src/gaia_cli/data/registry/named
          cp /tmp/gaia-snap/registry/gaia.json          src/gaia_cli/data/registry/gaia.json
          cp /tmp/gaia-snap/registry/named-skills.json  src/gaia_cli/data/registry/named-skills.json
          cp -r registry/named                          src/gaia_cli/data/registry/named
          echo "Bundled snapshot refreshed from ${TAG}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: if this version is already on PyPI (e.g. a re-dispatch or
          # an overlapping run), skip it instead of failing the job.
          skip-existing: true
