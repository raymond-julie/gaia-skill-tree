name: Python Package

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'README.md'
      - 'src/**'
      - 'scripts/**'
      - 'packages/cli-npm/cli/**'
      - 'tests/**'
      - 'registry/**'
      - 'registry/schema/**'
      - '.github/workflows/python-package.yml'
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'README.md'
      - 'src/**'
      - 'scripts/**'
      - 'packages/cli-npm/cli/**'
      - 'tests/**'
      - 'registry/**'
      - 'registry/schema/**'
      - '.github/workflows/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  package:
    name: Test, Build, and Smoke Test
    runs-on: ubuntu-latest
    if: >-
      !startsWith(github.head_ref || '', 'docs/') &&
      !startsWith(github.head_ref || '', 'design/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Fast tests (unit gate)
        # -n auto parallelizes the fast tier across cores. Safe here: unmarked
        # tests are pure-Python against tmp_path / in-memory objects (issue #684
        # item 3). The full suite below stays sequential because integration
        # tests write to the real repo generated-output/ and are not xdist-safe.
        run: python -m pytest tests/ -m "not integration and not slow" -n auto --timeout=30

      - name: Full tests
        run: gaia dev test all

      - name: Clean local build artifacts
        run: rm -rf build dist *.egg-info src/*.egg-info

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install wheel in clean environment
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/gaia-wheel-venv"
          "$RUNNER_TEMP/gaia-wheel-venv/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/gaia-wheel-venv/bin/gaia" --help
          "$RUNNER_TEMP/gaia-wheel-venv/bin/gaia" version
        env:
          GAIA_HOME: ${{ runner.temp }}/gaia-home
