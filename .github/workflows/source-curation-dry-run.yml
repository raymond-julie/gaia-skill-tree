name: Source Curation Dry Run

on:
  schedule:
    # Conservative monthly fixture-only report while crawler tool choice/costs remain undecided.
    - cron: '17 5 1 * *'
  workflow_dispatch:
    inputs:
      live_github:
        description: 'Manual-only opt-in to live GitHub API reads. Scheduled runs always use fixtures.'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: source-curation-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    name: Generate source-curation report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run dry-run source curation
        env:
          # Force fixture/no-network mode unless the manual dispatch input explicitly opts in.
          GAIA_SOURCE_CURATION_LIVE_GITHUB: "0"
        run: |
          set -euo pipefail

          LIVE_ARG=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.live_github }}" == "true" ]]; then
            LIVE_ARG="--github-live"
            echo "Manual live GitHub mode requested. No registry mutation or PR publishing will occur."
          else
            echo "Using default fixture/no-network source discovery."
          fi

          RUN_ID="source-curation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python3 scripts/sourceCuratorRunner.py --run-id "${RUN_ID}" ${LIVE_ARG}

          REPORT="generated-output/source-curation/${RUN_ID}/report.json"
          echo "report_path=${REPORT}" >> "$GITHUB_ENV"
          python3 - <<'PY' "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print("## Source curation dry-run report")
          print(f"- Report ID: `{report['reportId']}`")
          print(f"- Generated by: `{report['generatedBy']}`")
          print(f"- Dry run: `{report['dryRun']}`")
          print(f"- Proposals generated: `{report['summary']['proposalsGenerated']}`")
          print(f"- Estimated cost: `${report['quotaSummary']['estimatedTotalCostUsd']}`")
          PY

      - name: Assert dry run did not mutate registry state
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain registry/ registry-for-review/ skill-trees/ docs/graph/)" ]]; then
            git status --porcelain registry/ registry-for-review/ skill-trees/ docs/graph/
            echo "::error::source-curation dry run mutated registry state"
            exit 1
          fi

      - name: Upload dry-run report artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-curation-dry-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: generated-output/source-curation/**
          if-no-files-found: error
          retention-days: 14
