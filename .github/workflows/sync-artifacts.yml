name: Auto-Sync Registry Artifacts

on:
  push:
    branches: [main, 'dev/**', 'fix/**', 'feat/**', 'review/**', 'infra/**', 'workflow/**', 'chore/**', 'jules/**', 'claude/**', 'codex/**']
    paths:
      - 'registry/nodes/**'
      - 'registry/named/**'
      - 'registry/schema/**'
      - 'registry/suites/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Trigger Cloudflare deployment after sync'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate and Commit Artifacts
    runs-on: ubuntu-latest
    # Only auto-version + commit artifacts on the default branch. Feature branches
    # must NOT commit registry/gaia.json or docs/graph/gaia.json (see CLAUDE.md §8):
    # doing so manufactures merge conflicts in the four version-lockstep files.
    if: |
      github.ref_name == github.event.repository.default_branch &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-gen]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity
        # Must run BEFORE `gaia release`, which creates its own version-bump
        # commit. Without an identity here git aborts with "empty ident name".
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto-Versioning and Regeneration
        run: |
          # 1. Classify bump type from commit message
          MSG=$(git log -1 --format=%B)
          BUMP="patch"
          if echo "$MSG" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]*\))?!:'; then BUMP="major"; fi
          if echo "$MSG" | grep -Eq '^feat(\([^)]*\))?:'; then BUMP="minor"; fi

          # 2. Apply version bump and regenerate artifacts via CLI
          # We use --no-push because gaia release uses GITHUB_TOKEN by default,
          # which won't trigger the Release workflow on tag push.
          gaia release "$BUMP" --sync --no-push
          gaia docs build

      - name: Commit and Push Changes
        run: |
          # 1. Consolidate any unstaged changes (e.g. from docs build) into the commit
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            LAST_MSG=$(git log -1 --format=%B)
            if [[ "$LAST_MSG" == chore:\ release\ v* ]]; then
               echo "Amending release commit with regenerated artifacts..."
               git commit --amend --no-edit
            else
               echo "Creating auto-sync commit..."
               git commit -m "chore(auto): regenerate registry artifacts and sync docs [skip-gen]"
            fi
          fi

          # 2. Push with rebase + exponential backoff to survive concurrent pushes
          # This handles both the release commit and the auto-sync commit.
          if [[ -n "$(git log origin/${GITHUB_REF_NAME}..HEAD)" ]]; then
            n=0
            until [[ $n -ge 4 ]]; do
              if git push; then
                echo "Successfully pushed changes to origin/${GITHUB_REF_NAME}."
                break
              fi
              n=$((n + 1))
              echo "Push failed (attempt $n/4) — rebasing on origin/${GITHUB_REF_NAME} and retrying in $((2 ** n))s."
              git pull --rebase origin "${GITHUB_REF_NAME}"
              sleep $((2 ** n))
            done
            if [[ $n -ge 4 ]]; then
              echo "::error::Unable to push changes after 4 attempts."
              exit 1
            fi
          else
            echo "No local commits to push."
          fi

      - name: Tag Release
        # Push a version tag so release.yml fires and creates a GitHub Release.
        # The tag MUST be pushed with a PAT (RELEASE_PAT): pushes made with the
        # default GITHUB_TOKEN do NOT trigger other workflows, so a token-pushed
        # tag would silently never invoke release.yml.
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [[ -z "${RELEASE_PAT}" ]]; then
            echo "::warning::RELEASE_PAT is not set — skipping tag push. release.yml will NOT fire."
            echo "          Add a repo/PAT secret named RELEASE_PAT (contents:write) to enable releases."
            exit 0
          fi

          # Extract version from pyproject.toml (source of truth after gaia release).
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"

          # Update the local tag to point to the final amended/rebased commit.
          git tag -f "${TAG}"

          # Skip if this tag already exists remotely (idempotent).
          if git ls-remote --tags origin "${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on remote — skipping."
            exit 0
          fi

          git push "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git" "${TAG}"
          echo "Pushed tag ${TAG} → release.yml will create the GitHub Release."

      - name: Sync Wiki Pages
        if: github.event_name != 'pull_request' && github.repository == 'mbtiongson1/gaia-skill-tree'
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
        run: |
          # Clone wiki with write credentials adjacent to the main repo
          git clone "https://x-access-token:${WIKI_PAT}@github.com/mbtiongson1/gaia-skill-tree.wiki.git" ../gaia-wiki

          # Sync README marker regions → wiki pages and push to master
          python scripts/sync_wiki.py --wiki-dir ../gaia-wiki --push

      - name: Trigger Cloudflare Deploy
        if: github.event.inputs.deploy == 'true'
        run: |
          gh workflow run cloudflare-deploy.yml --ref ${{ github.ref_name }} -f branch=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
