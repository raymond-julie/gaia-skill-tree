name: Auto-Sync Registry Artifacts

on:
  # Run on EVERY push to the default branch — not just registry/script changes —
  # so that CLI-only and docs-only merges also get a version bump, a GitHub
  # Release, and a PyPI publish. The job's `if:` already restricts execution to
  # the default branch and skips bot/[skip-gen] commits, so this cannot loop.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Trigger Cloudflare deployment after sync'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write   # dispatch publish-pypi.yml and cloudflare-deploy.yml (workflow_dispatch)

# Serialize runs on the same ref. With the broadened trigger, several merges can
# land close together; without this they would race on the version bump + push.
concurrency:
  group: sync-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Regenerate and Commit Artifacts
    runs-on: ubuntu-latest
    # Only auto-version + commit artifacts on the default branch. Feature branches
    # must NOT commit registry/gaia.json or docs/graph/gaia.json (see CLAUDE.md §8):
    # doing so manufactures merge conflicts in the four version-lockstep files.
    if: |
      github.ref_name == github.event.repository.default_branch &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-gen]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git identity
        # Must run BEFORE `gaia release`, which creates its own version-bump
        # commit. Without an identity here git aborts with "empty ident name".
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto-Versioning and Regeneration
        run: |
          # 1. Classify bump type from commit message → release channel.
          #    See CONTEXT.md § Release Channels for the full contract:
          #      major  → production (published to PyPI, GitHub Release = latest)
          #      minor  → beta       (GitHub pre-release only)
          #      patch  → canary     (GitHub pre-release only)
          MSG=$(git log -1 --format=%B)
          BUMP="patch"
          if echo "$MSG" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]*\))?!:'; then BUMP="major"; fi
          if echo "$MSG" | grep -Eq '^feat(\([^)]*\))?:'; then BUMP="minor"; fi

          case "$BUMP" in
            major) CHANNEL="production" ;;
            minor) CHANNEL="beta" ;;
            *)     CHANNEL="canary" ;;
          esac

          # Export for later steps (GitHub Release labeling + PyPI gating).
          echo "GAIA_BUMP=$BUMP" >> "$GITHUB_ENV"
          echo "GAIA_CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "Bump: $BUMP → channel: $CHANNEL"

          # 2. Apply version bump and regenerate artifacts via CLI
          # We use --no-push because gaia release uses GITHUB_TOKEN by default,
          # which won't trigger the Release workflow on tag push.
          gaia dev release "$BUMP" --sync --no-push
          gaia dev docs

      - name: Restore badges from HEAD (auto-sync must NOT touch docs/badges/)
        # docs/badges/_assets/ and docs/badges/registry.json are NEVER
        # regenerated by auto-sync. They're a Cloudflare-served reward artifact
        # whose source-of-truth is human curation via infra/ PRs. The auto-sync
        # runner hydrates registry/named-skills.json via `gaia pull` from the
        # last GitHub Release, which can be stale — that staleness then makes
        # `gaia dev docs` regenerate a near-empty badge tree and wipe live
        # contributor SVGs. This restore step makes the wipe impossible by
        # reverting any badge-tree changes the regen produced.
        #
        # Tracked: badges must regenerate ONLY via infra/badge-* PRs that an
        # operator has reviewed locally with `gaia pull` against a known-good
        # snapshot. See founder/CLAUDE.md "Why auto-sync was banned from
        # docs/badges/" (added after the 2026-06-23 wipe).
        run: |
          git checkout HEAD -- docs/badges/_assets/ docs/badges/registry.json || true
          if [[ -n "$(git status --porcelain docs/badges/)" ]]; then
            echo "::warning::auto-sync produced badge drift; reverted to HEAD"
            git status --porcelain docs/badges/
          fi

      - name: Commit and Push Changes
        run: |
          # 1. Consolidate any unstaged changes (e.g. from docs build) into the commit
          # Use --fixup + --autosquash if we already made a release commit, so we 
          # don't have to manually --amend (which fails if rebase happens in between).
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            LAST_MSG=$(git log -1 --format=%B)
            if [[ "$LAST_MSG" == chore:\ release\ v* ]]; then
               echo "Creating fixup for release commit..."
               git commit --fixup HEAD
            else
               echo "Creating auto-sync commit..."
               git commit -m "chore(auto): regenerate registry artifacts and sync docs [skip-gen]"
            fi
          fi

          # 2. Push with rebase + exponential backoff to survive concurrent pushes
          # This handles both the release commit and the auto-sync commit.
          if [[ -n "$(git log origin/${GITHUB_REF_NAME}..HEAD)" ]]; then
            n=0
            until [[ $n -ge 4 ]]; do
              # Rebase with autosquash to merge fixups into the release commit
              if git fetch origin "${GITHUB_REF_NAME}" && git rebase --autosquash "origin/${GITHUB_REF_NAME}" && git push; then
                echo "Successfully pushed changes to origin/${GITHUB_REF_NAME}."
                break
              fi
              n=$((n + 1))
              echo "Push failed (attempt $n/4) — retrying in $((2 ** n))s."
              sleep $((2 ** n))
            done
            if [[ $n -ge 4 ]]; then
              echo "::error::Unable to push changes after 4 attempts."
              exit 1
            fi
          else
            echo "No local commits to push."
          fi

      - name: Tag Release
        # Push a version tag so release.yml fires and creates a GitHub Release.
        # The tag MUST be pushed with a PAT (RELEASE_PAT): pushes made with the
        # default GITHUB_TOKEN do NOT trigger other workflows, so a token-pushed
        # tag would silently never invoke release.yml.
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [[ -z "${RELEASE_PAT}" ]]; then
            echo "::warning::RELEASE_PAT is not set — skipping tag push. release.yml will NOT fire."
            echo "          Add a repo/PAT secret named RELEASE_PAT (contents:write) to enable releases."
            exit 0
          fi

          # Extract version from pyproject.toml (source of truth after gaia release).
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"

          # Update the local tag to point to the final amended/rebased commit.
          git tag -f "${TAG}"

          # Skip if this tag already exists remotely (idempotent).
          if git ls-remote --tags origin "${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on remote — skipping."
            exit 0
          fi

          git push "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git" "${TAG}"
          echo "Pushed tag ${TAG} → release.yml will create the GitHub Release."

      - name: Create GitHub Release
        # Create the Release directly in this job rather than depending on
        # release.yml firing from the tag push. A tag pushed by a token that
        # does not trigger workflows (the default GITHUB_TOKEN, GitHub App
        # tokens, and some PATs) will silently never invoke release.yml — which
        # is why tags historically accumulated with no Releases. Creating the
        # Release via the API works with the plain GITHUB_TOKEN (it can create
        # releases; it just cannot *trigger* other workflows). Idempotent.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"

          # Self-heal: if the tag never reached the remote (e.g. RELEASE_PAT
          # unset so the previous step skipped), push it with GITHUB_TOKEN.
          # The push won't trigger release.yml, but we create the Release below.
          if ! git ls-remote --tags origin "${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} missing on remote — pushing with GITHUB_TOKEN."
            git tag -f "${TAG}"
            git push origin "${TAG}" || echo "::warning::Could not push ${TAG}; release may target an existing tag."
          fi

          # Channel labeling: only production (major) is marked --latest; beta
          # (minor) and canary (patch) are GitHub pre-releases. See CONTEXT.md.
          if [ "${GAIA_CHANNEL}" = "production" ]; then
            CHANNEL_FLAGS="--latest"
          else
            CHANNEL_FLAGS="--prerelease --latest=false"
          fi

          if gh release view "${TAG}" --json tagName -q .tagName &>/dev/null; then
            echo "Release ${TAG} already exists — skipping."
          else
            gh release create "${TAG}" \
              --title "${TAG} (${GAIA_CHANNEL})" \
              --generate-notes \
              $CHANNEL_FLAGS
            echo "Created GitHub Release ${TAG} on the ${GAIA_CHANNEL} channel."
          fi

          echo "Packaging generated registry and graph artifacts..."
          tar -czf gaia-artifacts.tar.gz \
            registry/gaia.json \
            registry/gaia.gexf \
            registry/gaia.svg \
            registry/layouts_3d.json \
            registry/named-skills.json \
            registry/real-skills.json \
            registry/real-skills.md \
            docs/graph/

          echo "Uploading gaia-artifacts.tar.gz to release ${TAG}..."
          gh release upload "${TAG}" gaia-artifacts.tar.gz --clobber

      - name: Publish to PyPI
        # Production channel only: PyPI publishes happen on MAJOR bumps. beta and
        # canary stay as GitHub pre-releases (install from a tag/source instead).
        # publish-pypi.yml keys off `on: push tags: v*`, which never fires for a
        # tag pushed by an automation token (same limitation that broke Releases)
        # — so we dispatch it via workflow_dispatch, which DOES start a workflow
        # from a running job (with `actions: write`).
        if: env.GAIA_CHANNEL == 'production'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-pypi.yml --ref "${GITHUB_REF_NAME}" \
            && echo "Dispatched publish-pypi.yml (production) for ${GITHUB_REF_NAME}." \
            || echo "::warning::Could not dispatch publish-pypi.yml — publish PyPI manually if needed."

      - name: Sync Wiki Pages
        if: github.event_name != 'pull_request' && github.repository == 'mbtiongson1/gaia-skill-tree'
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
        run: |
          # Clone wiki with write credentials adjacent to the main repo
          git clone "https://x-access-token:${WIKI_PAT}@github.com/mbtiongson1/gaia-skill-tree.wiki.git" ../gaia-wiki

          # Sync README marker regions → wiki pages and push to master
          python scripts/sync_wiki.py --wiki-dir ../gaia-wiki --push

      - name: Trigger Cloudflare Deploy
        # Now that the job grants `actions: write`, this dispatch succeeds (it
        # previously 403'd and reddened every run). Kept continue-on-error as a
        # belt-and-suspenders guard so a transient dispatch hiccup never fails an
        # otherwise-successful release run.
        if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
        continue-on-error: true
        run: |
          gh workflow run cloudflare-deploy.yml --ref ${{ github.ref_name }} -f branch=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
