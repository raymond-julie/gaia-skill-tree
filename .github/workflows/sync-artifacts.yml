name: Auto-Sync Registry Artifacts

on:
  push:
    branches: [main, 'dev/**', 'fix/**', 'feat/**', 'review/**', 'infra/**', 'workflow/**']
    paths:
      - 'registry/nodes/**'
      - 'registry/named/**'
      - 'registry/schema/**'
      - 'registry/suites/**'
      - 'scripts/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate and Commit Artifacts
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-gen]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Auto-Versioning and Regeneration
        run: |
          # 1. Classify bump type from commit message
          MSG=$(git log -1 --format=%B)
          BUMP="patch"
          if echo "$MSG" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]*\))?!:'; then BUMP="major"; fi
          if echo "$MSG" | grep -Eq '^feat(\([^)]*\))?:'; then BUMP="minor"; fi
          
          # 2. Apply version bump and regenerate artifacts via CLI
          gaia release $BUMP
          gaia docs build

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "chore(auto): regenerate registry artifacts and sync docs"
            git push
          fi
