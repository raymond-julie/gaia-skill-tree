name: Sync Docs Assets

on:
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'scripts/generateProjections.py'
      - 'scripts/exportGexf.py'
      - 'scripts/renderGraphSvg.py'
      - 'scripts/generateNamedIndex.py'
      - 'scripts/syncDocsGraphAssets.py'

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate and commit docs assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate Projections
        run: python scripts/generateProjections.py

      - name: Export GEXF
        run: python scripts/exportGexf.py

      - name: Render Graph SVG
        run: python scripts/renderGraphSvg.py --format svg

      - name: Generate Named Skills Index
        run: python scripts/generateNamedIndex.py

      - name: Sync all docs assets
        run: python scripts/syncDocsGraphAssets.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graph/ docs/tree.md registry/named-skills.json
          git diff --cached --quiet || git commit -m "chore: regenerate docs assets [skip ci]"
          git push
