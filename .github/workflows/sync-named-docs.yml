name: Sync Named Skills Docs

on:
  push:
    branches:
      - main
    paths:
      - 'registry/named/**'
      - 'registry/gaia.json'
      - 'scripts/generateNamedIndex.py'

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate and commit named-skills index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Named Skills Index
        run: python scripts/generateNamedIndex.py

      - name: Sync to docs
        run: |
          mkdir -p docs/graph/named
          cp registry/named-skills.json docs/graph/named/index.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/named-skills.json docs/graph/named/index.json
          git diff --cached --quiet || git commit -m "chore: regenerate named-skills index [skip ci]"
          git push
