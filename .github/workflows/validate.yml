name: Validate Gaia Graph

on:
  # SCOPE NOTE — keep this list tight. `validate.yml` runs `gaia dev validate`
  # which checks repo-wide invariants (registry redaction state, lockstep,
  # timeline transparency). It MUST trigger only on changes that can actually
  # affect those invariants. A previous over-broad `.github/workflows/**` glob
  # caused unrelated workflow edits to be blocked by pre-existing main-state
  # drift in `docs/badges/_assets/` — see issue #801 and PR #800 retro.
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'skill-trees/**'
      # - 'registry-for-review/**'
      - 'scripts/**'
      - 'packages/cli-npm/**'
      - 'tests/**'
      - '.github/workflows/validate.yml'
      - 'docs/badges/_assets/**'
      - 'docs/badges/registry.json'
  pull_request:
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'skill-trees/**'
      # - 'registry-for-review/**'
      - 'scripts/**'
      - 'packages/cli-npm/**'
      - 'tests/**'
      - '.github/workflows/validate.yml'
      - 'docs/badges/_assets/**'
      - 'docs/badges/registry.json'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Schema + DAG + Integrity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build intermediate registry artifacts
        run: |
          python scripts/assemble_gaia.py
          python scripts/generateNamedIndex.py
          mkdir -p docs/graph/named
          cp registry/named-skills.json docs/graph/named/index.json

      - name: Verify Version Lockstep
        run: python scripts/verify_lockstep.py

      - name: Run validation
        run: gaia dev validate

      # - name: Run intake validation
      #   run: gaia dev validate --intake

      - name: Check generated docs
        run: |
          echo "Equivalent python command for local use: python scripts/build_docs.py --check"
          gaia dev docs --check

      - name: Run tests
        if: |
          github.event_name == 'push' ||
          github.event.pull_request.changed_files >= 10 ||
          contains(github.event.pull_request.labels.*.name, 'run-full-ci')
        run: gaia dev test all

      - name: Check schema meta sync
        # Skip for branch types that cannot affect registry meta-sync:
        #   docs/, design/ — only touch docs/ and *.md, no registry changes
        #   infra/         — only touch .github/, scripts/, skills/; no schema/node edits
        #   review/gaia-push/ — intake layer only; committed registry is unchanged
        # All other prefixes (cli/, review/meta/, schema/, dev/, cross-cutting) still run.
        if: |
          github.event_name == 'push' ||
          (
            !startsWith(github.head_ref, 'docs/') &&
            !startsWith(github.head_ref, 'design/') &&
            !startsWith(github.head_ref, 'infra/') &&
            !startsWith(github.head_ref, 'review/gaia-push/')
          )
        run: gaia dev validate --meta-sync

  skill-quality:
    name: Agent Skill Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Run skill validation
        run: python scripts/validate_skills.py
