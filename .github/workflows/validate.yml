name: Validate Gaia Graph

on:
  pull_request:
    paths:
      - 'graph/**'
      - 'schema/**'
      - 'users/**'
      - 'intake/**'
      - 'scripts/**'
      - 'plugin/**'

jobs:
  validate:
    name: Schema + DAG + Integrity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install build jsonschema pytest setuptools wheel

      - name: Run validation
        run: python scripts/validate.py

      - name: Run intake validation
        run: python scripts/validate_intake.py

      - name: Run tests
        run: pytest tests/
