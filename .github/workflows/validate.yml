name: Validate Gaia Graph

on:
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'skill-trees/**'
      - 'registry-for-review/**'
      - 'scripts/**'
      - 'packages/cli-npm/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'registry/**'
      - 'registry/schema/**'
      - 'skill-trees/**'
      - 'registry-for-review/**'
      - 'scripts/**'
      - 'packages/cli-npm/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch: {}

jobs:
  validate:
    name: Schema + DAG + Integrity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run validation
        run: gaia validate

      - name: Run intake validation
        run: gaia validate --intake

      - name: Check generated docs
        run: |
          echo "Equivalent python command for local use: python scripts/build_docs.py --check"
          gaia docs build --check

      - name: Run tests
        if: |
          github.event_name == 'push' ||
          github.event.pull_request.changed_files >= 10
        run: gaia test all

      - name: Check schema meta sync
        if: |
          github.event_name == 'push' ||
          !contains(fromJSON('["docs", "design"]'), github.head_ref)
        run: gaia validate --meta-sync
