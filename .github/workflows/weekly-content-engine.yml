name: Weekly Content Engine

on:
  schedule:
    # Monday 08:00 UTC — first cadence per SPRINT_D_EPIC_PLAN §W1
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      forcePublish:
        description: "Force publish flag ('1' = write canonical, '0' = draft-only)"
        required: false
        default: '0'
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-content-engine
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: content-engine-live
    env:
      # Precedence: workflow_dispatch input > repo variable > default '0'.
      # `vars` (not `secrets`) is correct — the 0/1 flag isn't secret; the
      # environment approval gates who can flip it.
      GAIA_CONTENT_ENGINE_PUBLISH: ${{ github.event.inputs.forcePublish || vars.GAIA_CONTENT_ENGINE_PUBLISH || '0' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute ISO week label
        id: week
        run: |
          label=$(python -c "from datetime import datetime; c = datetime.utcnow().isocalendar(); print(f'{c.year:04d}-{c.week:02d}')")
          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "Weekly report label: ${label}"

      - name: Generate weekly report
        id: gen
        run: |
          python scripts/contentEngine/generate_weekly_report.py \
            --out-dir docs \
            --publish "${GAIA_CONTENT_ENGINE_PUBLISH}"

      - name: Show what got produced
        run: |
          echo "::group::docs/reports"
          find docs/reports -type f 2>/dev/null | head -50 || true
          echo "::endgroup::"
          echo "::group::docs/api/v1/reports"
          find docs/api/v1/reports -type f 2>/dev/null | head -20 || true
          echo "::endgroup::"

      # ── Draft-only path ────────────────────────────────────────────────
      - name: Upload DRAFT artifact (publish=0)
        if: env.GAIA_CONTENT_ENGINE_PUBLISH != '1'
        uses: actions/upload-artifact@v4
        with:
          name: gaia-content-engine-draft-${{ steps.week.outputs.label }}
          path: docs/reports/DRAFT/
          if-no-files-found: warn
          retention-days: 30

      # ── Publish path ───────────────────────────────────────────────────
      - name: Branch, commit, and open auto-PR (publish=1)
        if: env.GAIA_CONTENT_ENGINE_PUBLISH == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: ${{ steps.week.outputs.label }}
        run: |
          set -euo pipefail
          branch="docs/content-engine-${LABEL}"
          echo "Publishing on ${branch}"

          # Guard: skip if there is no diff (e.g. cron re-ran within the same
          # ISO week and nothing changed).
          if git diff --quiet -- docs/reports/ docs/api/v1/reports/; then
            echo "No content-engine changes to publish for ${LABEL}."
            exit 0
          fi

          git checkout -b "${branch}"
          git add docs/reports/ docs/api/v1/reports/
          git commit \
            -m "feat(content-engine): weekly report ${LABEL}" \
            -m "Auto-generated by .github/workflows/weekly-content-engine.yml. Salvage layer + generation metadata baked into the canonical JSON."

          git push --set-upstream origin "${branch}"

          # Inline the PR body via heredoc — no .github/pr-templates/ dir
          # (GitHub doesn't have that convention; only .github/PULL_REQUEST_TEMPLATE/).
          body_file="$(mktemp)"
          cat > "${body_file}" <<'EOF'
          Auto-generated weekly Content Engine report.

          - Canonical JSON: `docs/api/v1/reports/__LABEL__.json`
          - Public HTML: `docs/reports/__LABEL__/index.html`
          - Archive rebuilt: `docs/reports/index.html` + `docs/api/v1/reports/index.json`

          The salvage layer is stamped into the canonical JSON's `salvageLayer`
          field so a post-mortem can identify which layer produced this report.

          ## Migration notes

          - **Portable:** `scripts/contentEngine/**/*.py`, `templates/`, `tests/contentEngine/`, `.github/workflows/weekly-content-engine.yml`. Survives Sprint F.
          - **Rewrites:** `docs/reports/**/*.html` and `docs/reports/index.html` — Sprint F Next.js `<Report>` page consumes `docs/api/v1/reports/YYYY-WW.json` unchanged.
          - **Invariants:** URL `/reports/YYYY-WW/` FROZEN. Canonical JSON shape at `docs/api/v1/reports/YYYY-WW.json` FROZEN (SDK contract). ISO week format `%G-%V` FROZEN.

          Reviewer: Marco. Toggle `GAIA_CONTENT_ENGINE_PUBLISH` in the
          `content-engine-live` GitHub Environment to control future runs.
          EOF
          # Substitute the ISO-week label into the body text.
          sed -i "s/__LABEL__/${LABEL}/g" "${body_file}"

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "feat(content-engine): weekly report ${LABEL}" \
            --body-file "${body_file}" \
            --label "content-engine"

      - name: Job summary
        if: always()
        run: |
          echo "## Weekly Content Engine — ${{ steps.week.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish flag: \`${GAIA_CONTENT_ENGINE_PUBLISH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Report label: \`${{ steps.week.outputs.label }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${GAIA_CONTENT_ENGINE_PUBLISH}" = "1" ]; then
            echo "- Mode: **published** — auto-PR opened on \`docs/content-engine-${{ steps.week.outputs.label }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Mode: **draft-only** — see uploaded artifact \`gaia-content-engine-draft-${{ steps.week.outputs.label }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
