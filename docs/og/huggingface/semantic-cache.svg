  <!-- Discoverer signature -->
  <text x="48" y="538" font-family="'EB Garamond',Georgia,serif" font-size="22" font-style="italic" fill="#ef4444" dominant-baseline="middle"><tspan font-style="normal" fill-opacity="0.82">Cataloged by </tspan><tspan font-weight="600">@huggingface</tspan> <tspan font-style="normal" fill-opacity="0.5">·</tspan> <tspan font-style="normal" fill-opacity="0.7"> 2026</tspan></text>

