<style>
  /* ───────────────────────────────────────────────────────────────────
     Starless taxonomy — a single-page ledger.
     Left: the generic (starless) reference, italic + muted per DESIGN.md.
     Right: its named implementations, Ultimate-first, as @handle/slug chips
            (honor-red handle + per-rank slug colour).
     A sleek floating A-Z rail lives in the right gutter; it touches nothing.
     ─────────────────────────────────────────────────────────────────── */

  /* Controls strip */
  .sl-controls {
    display: flex; gap: .9rem; align-items: center; flex-wrap: wrap;
    margin: 1.5rem 0 .5rem;
  }
  .sl-search-wrap { position: relative; flex: 1 1 280px; max-width: 420px; }
  .sl-search {
    width: 100%; padding: .6rem 2.2rem .6rem .9rem; font-size: .95rem;
    font-family: var(--font-body); color: var(--text);
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    transition: border-color .15s;
  }
  .sl-search:focus { outline: none; border-color: var(--tier-basic); }
  .sl-search::placeholder { color: var(--muted); }
  .sl-search-clear {
    position: absolute; right: .55rem; top: 50%; transform: translateY(-50%);
    width: 22px; height: 22px; display: none; align-items: center; justify-content: center;
    background: none; border: 0; cursor: pointer; color: var(--muted); font-size: 1rem; line-height: 1;
  }
  .sl-search-clear:hover { color: var(--text); }
  .sl-search:not(:placeholder-shown) ~ .sl-search-clear { display: flex; }

  .sl-btn {
    padding: .55rem .9rem; font-size: .82rem; font-family: var(--font-mono);
    letter-spacing: .02em; color: var(--text); background: transparent;
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    transition: border-color .15s, color .15s, background-color .15s; white-space: nowrap;
  }
  .sl-btn:hover { border-color: var(--tier-basic); color: var(--tier-basic); }
  .sl-btn[aria-pressed="true"] {
    border-color: var(--tier-basic); color: var(--tier-basic);
    background: rgba(var(--tier-basic-rgb), .08);
  }
  .sl-stats {
    margin-left: auto; color: var(--muted); font-family: var(--font-mono);
    font-size: .78rem; letter-spacing: .03em; white-space: nowrap;
  }

  /* The ledger */
  .sl-ledger { list-style: none; margin: 1.25rem 0 4rem; padding: 0; }

  .sl-letter {
    font: 400 1.4rem/1 var(--font-display); color: var(--muted);
    opacity: .5; letter-spacing: .03em;
    margin: 2.4rem 0 .35rem; padding-bottom: .35rem;
    border-bottom: 1px solid var(--border); scroll-margin-top: 90px;
  }
  .sl-letter:first-child { margin-top: .5rem; }

  .sl-row {
    display: grid; grid-template-columns: minmax(170px, 16rem) 1fr;
    gap: .35rem 2rem; align-items: baseline;
    padding: .5rem 0; border-bottom: 1px solid var(--border);
    transition: background-color .12s;
  }
  .sl-row:hover { background: rgba(var(--tier-basic-rgb), .035); }

  .sl-generic {
    font: italic 400 1.02rem/1.4 var(--font-display); color: var(--muted);
  }
  .sl-row.is-empty .sl-generic { opacity: .55; }

  .sl-named {
    display: flex; flex-wrap: wrap; gap: .2rem 1.1rem;
    font: 500 .8rem/1.55 var(--font-mono);
  }
  .sl-chip { white-space: nowrap; text-decoration: none; }
  .sl-chip .at,
  .sl-chip .handle { color: var(--honor-red); }
  .sl-chip .slash { color: var(--muted); opacity: .55; }
  .sl-chip .slug { color: var(--text); }              /* rank colour set inline */
  .sl-chip:hover .slug { text-decoration: underline; text-underline-offset: 2px; }
  .sl-none { color: var(--muted); opacity: .4; font-style: italic; font-family: var(--font-body); }

  .sl-msg { color: var(--muted); font-style: italic; padding: 2rem 0; }

  /* The floating A-Z rail is the universal AlphaRail component
     (css/alpha-rail.css + js/alpha-rail.js); it reserves its own lane. */

  @media (max-width: 720px) {
    .sl-row { grid-template-columns: 1fr; gap: .3rem; padding: .7rem 0; }
    .sl-generic { font-size: 1.05rem; }
    .sl-named { gap: .25rem .85rem; }
    .sl-chip { white-space: normal; overflow-wrap: anywhere; }
    .sl-stats { margin-left: 0; flex-basis: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .sl-row, .sl-search { transition: none; }
  }
</style>

<body class="process-page">

<main>
  <!-- ─── BACK ─── -->
  <div class="profile-back-row">
    <a class="profile-back" href="index.html" aria-label="Back" onclick="if(history.length>1){event.preventDefault();history.back();}">
      <svg class="ico" width="14" height="14" aria-hidden="true"><use href="assets/icons.svg#arrow-back"/></svg>
      <span>Back</span>
    </a>
  </div>

  <section class="process-hero">
    <p class="process-kicker">Rank-less taxonomy</p>
    <h1>Starless</h1>
    <p class="process-lede">
      Generic taxonomy nodes that carry no stars of their own. Stars live on the
      <strong>named implementations</strong> beside each one: the concrete, contributed
      skills, listed highest rank first.
    </p>
  </section>

  <section class="process-section">
    <h2 id="taxonomy">The Starless Taxonomy</h2>

    <div class="sl-controls">
      <div class="sl-search-wrap">
        <input type="text" class="sl-search" id="slSearch"
               placeholder="Search starless or named skills…" aria-label="Search the taxonomy">
        <button type="button" class="sl-search-clear" id="slSearchClear" aria-label="Clear search">✕</button>
      </div>
      <button type="button" class="sl-btn" id="slToggleEmpty" aria-pressed="false">Hide empty</button>
      <button type="button" class="sl-btn" id="slCsv">Copy CSV</button>
      <span class="sl-stats" id="slStats"></span>
    </div>

    <ul class="sl-ledger" id="slLedger">
      <li class="sl-msg">Loading the taxonomy…</li>
    </ul>
  </section>
</main>

<!-- ─── FOOTER v2 ─── -->
  <div id="site-footer-mount"></div>
  <script src="js/site-footer.js?v=5.11.1"></script>

  <!-- ─── TREE DIALOG ─── -->
  <a id="tree" tabindex="-1" aria-hidden="true"></a>
  <dialog id="treeDialog" class="tree-dialog" aria-labelledby="treeDialogTitle">
    <div class="tree-dialog-inner">
      <div class="tree-dialog-header">
        <div id="treeDialogTitle" class="tree-dialog-title">Gaia Skill Tree</div>
        <div class="tree-dialog-actions">
          <button type="button" class="tree-act-btn" id="treeCopyBtn">Copy</button>
          <button type="button" class="tree-act-btn" id="treeDownloadBtn">Download</button>
          <button type="button" class="tree-close-x" id="treeCloseBtn" aria-label="Close tree">✕</button>
        </div>
      </div>
      <div class="tree-dialog-body">
        <pre id="treeDialogPre">Loading…</pre>
      </div>
    </div>
  </dialog>
  <button id="scrollToTop" class="scroll-to-top" aria-label="Scroll to top">
    <svg class="ico" width="20" height="20" aria-hidden="true"><use href="assets/icons.svg#arrow-up"/></svg>
  </button>

  <!-- ─── STARLESS DATA RENDER ─── -->
  <script>
    (function () {
      "use strict";

      var ledgerEl = document.getElementById("slLedger");
      var searchEl = document.getElementById("slSearch");
      var clearEl  = document.getElementById("slSearchClear");
      var emptyBtn = document.getElementById("slToggleEmpty");
      var csvBtn   = document.getElementById("slCsv");
      var statsEl  = document.getElementById("slStats");

      var REDUCED = window.matchMedia &&
                    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      // Universal alphabetical scrubber. Tapping/scrubbing a letter scrolls the
      // ledger to that letter's group; scroll position feeds back via setActive.
      var rail = new AlphaRail({
        side: "right",
        onSelect: function (L, instant) {
          var t = document.getElementById("L-" + L);
          if (t) t.scrollIntoView({ behavior: (instant || REDUCED) ? "auto" : "smooth", block: "start" });
        }
      });

      // Continuous scroll-follow: map the viewport centre's position within the
      // ledger to 0..1 and let the rail glide to match (no aggressive snapping).
      var followQueued = false;
      function syncRail(instant) {
        var r = ledgerEl.getBoundingClientRect();
        if (r.height <= 0) return;
        var p = (window.innerHeight / 2 - r.top) / r.height;
        rail.follow(p, instant);
      }
      window.addEventListener("scroll", function () {
        if (followQueued) return;
        followQueued = true;
        requestAnimationFrame(function () { followQueued = false; syncRail(false); });
      }, { passive: true });

      var allSkills = [];     // starless generic refs
      var buckets   = {};     // id -> [named skills]
      var hideEmpty = false;

      function nameOf(x) { return (x && (x.name || x.title || x.id)) || ""; }
      function byName(a, b) {
        var an = nameOf(a).toLowerCase(), bn = nameOf(b).toLowerCase();
        return an < bn ? -1 : an > bn ? 1 : 0;
      }
      function starOf(child) {
        var m = /(\d+)/.exec(child && child.level ? String(child.level) : "");
        return m ? parseInt(m[1], 10) : 0;
      }
      // Ultimate-first: highest rank leads, name breaks ties.
      function byRankDesc(a, b) { return starOf(b) - starOf(a) || byName(a, b); }

      function firstLetter(skill) {
        var c = nameOf(skill).charAt(0).toUpperCase();
        return /[A-Z]/.test(c) ? c : "#";
      }
      function txt(v) { return document.createTextNode(v == null ? "" : String(v)); }

      // Split a named id ("handle/slug") into handle + slug, with fallbacks.
      function splitHandle(child) {
        var id = child && child.id ? String(child.id) : "";
        var slash = id.indexOf("/");
        if (slash > 0) return { handle: id.slice(0, slash), slug: id.slice(slash + 1) };
        var handle = (child && child.contributor) || "";
        var slug = nameOf(child).toLowerCase().replace(/\s+/g, "-");
        return { handle: handle, slug: slug };
      }

      function chip(child) {
        var parts = splitHandle(child);
        var star = starOf(child);
        // Pre-named/demoted (≤1★) named refs are redacted on this public index:
        // withhold the handle (slate "@[anonymous]") and drop the source link,
        // which would otherwise reveal the contributor via the repo.
        var redacted = window.isRedacted ? window.isRedacted(child && child.level) : (star <= 1);
        var url = !redacted && child && child.links && child.links.github;
        var el = document.createElement(url ? "a" : "span");
        el.className = "sl-chip";
        if (url) { el.href = url; el.target = "_blank"; el.rel = "noopener"; }
        el.title = nameOf(child) + (child.level ? "  ·  " + child.level : "");

        var at = document.createElement("span");
        if (redacted) {
          // Monospace index → slate block redaction (not "@[anonymous]").
          at.className = "handle plaque__redacted-handle";
          at.setAttribute("aria-label", "Contributor not yet revealed");
          at.appendChild(txt("████████"));
        } else {
          at.className = "handle"; at.appendChild(txt("@" + parts.handle));
        }
        var sep = document.createElement("span");
        sep.className = "slash"; sep.appendChild(txt("/"));
        var slug = document.createElement("span");
        slug.className = "slug"; slug.appendChild(txt(parts.slug));
        if (star >= 2 && star <= 6) slug.style.color = "var(--rank-" + star + ")";

        el.appendChild(at); el.appendChild(sep); el.appendChild(slug);
        return el;
      }

      function row(skill) {
        var kids = (buckets[skill.id] || []).slice().sort(byRankDesc);
        var li = document.createElement("li");
        li.className = "sl-row" + (kids.length ? "" : " is-empty");

        var gen = document.createElement("div");
        gen.className = "sl-generic";
        gen.appendChild(txt(nameOf(skill)));
        li.appendChild(gen);

        var named = document.createElement("div");
        named.className = "sl-named";
        if (kids.length) {
          kids.forEach(function (k) { named.appendChild(chip(k)); });
        } else {
          var none = document.createElement("span");
          none.className = "sl-none"; none.appendChild(txt("no named skills yet"));
          named.appendChild(none);
        }
        li.appendChild(named);
        return li;
      }

      function matches(skill, q) {
        if (nameOf(skill).toLowerCase().indexOf(q) !== -1) return true;
        return (buckets[skill.id] || []).some(function (k) {
          return nameOf(k).toLowerCase().indexOf(q) !== -1 ||
                 String(k.id || "").toLowerCase().indexOf(q) !== -1 ||
                 String(k.contributor || "").toLowerCase().indexOf(q) !== -1;
        });
      }

      function currentView() {
        var q = searchEl.value.toLowerCase().trim();
        return allSkills.filter(function (s) {
          if (hideEmpty && !(buckets[s.id] || []).length) return false;
          if (q && !matches(s, q)) return false;
          return true;
        }).sort(byName);
      }

      function render() {
        var view = currentView();
        ledgerEl.innerHTML = "";

        if (!view.length) {
          var msg = document.createElement("li");
          msg.className = "sl-msg";
          msg.appendChild(txt("Nothing matches that search."));
          ledgerEl.appendChild(msg);
          rail.render({});
          updateStats(view);
          return;
        }

        var counts = {};
        var letter = null;
        view.forEach(function (skill) {
          var L = firstLetter(skill);
          if (L >= "A" && L <= "Z") counts[L] = (counts[L] || 0) + 1;
          if (L !== letter) {
            letter = L;
            var head = document.createElement("li");
            head.className = "sl-letter";
            head.id = "L-" + L;
            head.setAttribute("data-letter", L);
            head.appendChild(txt(L === "#" ? "#" : L));
            ledgerEl.appendChild(head);
          }
          ledgerEl.appendChild(row(skill));
        });

        rail.render(counts);
        updateStats(view);
        syncRail(true);
      }

      function updateStats(view) {
        var named = view.reduce(function (n, s) { return n + (buckets[s.id] || []).length; }, 0);
        statsEl.textContent = view.length + " starless · " + named + " named";
      }

      function csvCell(v) {
        v = String(v == null ? "" : v);
        return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
      }
      function copyCsv() {
        var rows = ["Starless,Named Skill,Contributor,Level"];
        currentView().forEach(function (s) {
          var kids = (buckets[s.id] || []).slice().sort(byRankDesc);
          if (kids.length) {
            kids.forEach(function (k) {
              // Redact pre-named/demoted (≤1★) rows: withhold the handle in both
              // the named-skill id and the contributor column.
              var red = window.isRedacted && window.isRedacted(k.level);
              var namedCell = red
                ? "[anonymous]/" + ((String(k.id || "").split("/")[1]) || nameOf(k))
                : (k.id || nameOf(k));
              var contribCell = red ? "[anonymous]" : (k.contributor || "");
              rows.push([csvCell(nameOf(s)), csvCell(namedCell),
                         csvCell(contribCell), csvCell(k.level || "")].join(","));
            });
          } else {
            rows.push([csvCell(nameOf(s)), "", "", ""].join(","));
          }
        });
        navigator.clipboard.writeText(rows.join("\n")).then(function () {
          var was = csvBtn.textContent; csvBtn.textContent = "Copied ✓";
          setTimeout(function () { csvBtn.textContent = was; }, 1800);
        }).catch(function () { csvBtn.textContent = "Copy failed"; });
      }

      // Events
      searchEl.addEventListener("input", render);
      clearEl.addEventListener("click", function () { searchEl.value = ""; searchEl.focus(); render(); });
      emptyBtn.addEventListener("click", function () {
        hideEmpty = !hideEmpty;
        emptyBtn.setAttribute("aria-pressed", String(hideEmpty));
        emptyBtn.textContent = hideEmpty ? "Show empty" : "Hide empty";
        render();
      });
      csvBtn.addEventListener("click", copyCsv);

      // Load
      Promise.all([
        fetch("graph/gaia.json").then(function (r) { return r.json(); }),
        fetch("graph/named/index.json").then(function (r) { return r.json(); })
      ]).then(function (res) {
        allSkills = (res[0] && res[0].skills) || [];
        buckets   = (res[1] && res[1].buckets) || {};
        render();
      }).catch(function () {
        ledgerEl.innerHTML = "";
        var li = document.createElement("li");
        li.className = "sl-msg";
        li.appendChild(txt("Could not load the starless taxonomy. Please try again."));
        ledgerEl.appendChild(li);
      });
    })();
  </script>
