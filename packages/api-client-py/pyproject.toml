[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gaia-registry-client"
version = "0.1.0"
description = "Python client for the Gaia Registry API — sync + async, fully typed"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Gaia Contributors" },
]
keywords = ["gaia", "registry", "api-client", "sdk", "skills", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.5",
]

[project.urls]
Homepage = "https://gaiaskilltree.com"
Repository = "https://github.com/gaia-research/gaia-skill-tree"
Documentation = "https://gaiaskilltree.com/api/v1/health.json"

[tool.hatch.build.targets.wheel]
packages = ["src/gaia_registry_client"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: tests that hit the live API (deselect with -m 'not integration')",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
