        "type": "ultimate",
        "installBody": "**Requirements:** [Claude Code](https://docs.anthropic.com/en/docs/claude-code), [Git](https://git-scm.com/), [Bun](https://bun.sh/) v1.0+, [Node.js](https://nodejs.org/) (Windows only)\n\n### Step 1: Install on your machine\n\nOpen Claude Code and paste this. Claude does the rest.\n\n&gt; Install gstack: run **`git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack &amp;&amp; cd ~/.claude/skills/gstack &amp;&amp; ./setup`** then add a \"gstack\" section to CLAUDE.md that says to use the /browse skill from gstack for all web browsing, never use mcp\\_\\_claude-in-chrome\\_\\_\\* tools, and lists the available skills: /office-hours, /plan-ceo-review, /plan-eng-review, /plan-design-review, /design-consultation, /design-shotgun, /design-html, /review, /ship, /land-and-deploy, /canary, /benchmark, /browse, /connect-chrome, /qa, /qa-only, /design-review, /setup-browser-cookies, /setup-deploy, /setup-gbrain, /retro, /investigate, /document-release, /document-generate, /codex, /cso, /autoplan, /plan-devex-review, /devex-review, /careful, /freeze, /guard, /unfreeze, /gstack-upgrade, /learn. Then ask the user if they also want to add gstack to the current project so teammates get it.\n\n### Step 2: Team mode — auto-update for shared repos (recommended)\n\nFrom inside your repo, paste this. Switches you to team mode, bootstraps the repo so teammates get gstack automatically, and commits the change:\n\n```bash\n(cd ~/.claude/skills/gstack &amp;&amp; ./setup --team) &amp;&amp; ~/.claude/skills/gstack/bin/gstack-team-init required &amp;&amp; git add .claude/ CLAUDE.md &amp;&amp; git commit -m \"require gstack for AI-assisted work\"\n```bash\nNo vendored files in your repo, no version drift, no manual upgrades. Every Claude Code session starts with a fast auto-update check (throttled to once/hour, network-failure-safe, completely silent).\n\nSwap `required` for `optional` if you'd rather nudge teammates than block them.\n\n### OpenClaw\n\nOpenClaw spawns Claude Code sessions via ACP, so every gstack skill just works\nwhen Claude Code has gstack installed. Paste this to your OpenClaw agent:\n\n&gt; Install gstack: run `git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack &amp;&amp; cd ~/.claude/skills/gstack &amp;&amp; ./setup` to install gstack for Claude Code. Then add a \"Coding Tasks\" section to AGENTS.md that says: when spawning Claude Code sessions for coding work, tell the session to use gstack skills. Include these examples — security audit: \"Load gstack. Run /cso\", code review: \"Load gstack. Run /review\", QA test a URL: \"Load gstack. Run /qa https://...\", build a feature end-to-end: \"Load gstack. Run /autoplan, implement the plan, then run /ship\", plan before building: \"Load gstack. Run /office-hours then /autoplan. Save the plan, don't implement.\"\n\n**After setup, just talk to your OpenClaw agent naturally:**\n\n| You say | What happens |\n|---------|-------------|\n| \"Fix the typo in README\" | Simple — Claude Code session, no gstack needed |\n| \"Run a security audit on this repo\" | Spawns Claude Code with `Run /cso` |\n| \"Build me a notifications feature\" | Spawns Claude Code with /autoplan → implement → /ship |\n| \"Help me plan the v2 API redesign\" | Spawns Claude Code with /office-hours → /autoplan, saves plan |\n\nSee [docs/OPENCLAW.md](docs/OPENCLAW.md) for advanced dispatch routing and\nthe gstack-lite/gstack-full prompt templates.\n\n### Native OpenClaw Skills (via ClawHub)\n\nFour methodology skills that work directly in your OpenClaw agent, no Claude Code\nsession needed. Install from ClawHub:\n\n```\nclawhub install gstack-openclaw-office-hours gstack-openclaw-ceo-review gstack-openclaw-investigate gstack-openclaw-retro\n```bash\n| Skill | What it does |\n|-------|-------------|\n| `gstack-openclaw-office-hours` | Product interrogation with 6 forcing questions |\n| `gstack-openclaw-ceo-review` | Strategic challenge with 4 scope modes |\n| `gstack-openclaw-investigate` | Root cause debugging methodology |\n| `gstack-openclaw-retro` | Weekly engineering retrospective |\n\nThese are conversational skills. Your OpenClaw agent runs them directly via chat.\n\n### Other AI Agents\n\ngstack works on 10 AI coding agents, not just Claude. Setup auto-detects which\nagents you have installed:\n\n```bash\ngit clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/gstack\ncd ~/gstack &amp;&amp; ./setup\n```\n\nOr target a specific agent with `./setup --host &lt;name&gt;`:\n\n| Agent | Flag | Skills install to |\n|-------|------|-------------------|\n| OpenAI Codex CLI | `--host codex` | `~/.codex/skills/gstack-*/` |\n| OpenCode | `--host opencode` | `~/.config/opencode/skills/gstack-*/` |\n| Cursor | `--host cursor` | `~/.cursor/skills/gstack-*/` |\n| Factory Droid | `--host factory` | `~/.factory/skills/gstack-*/` |\n| Slate | `--host slate` | `~/.slate/skills/gstack-*/` |\n| Kiro | `--host kiro` | `~/.kiro/skills/gstack-*/` |\n| Hermes | `--host hermes` | `~/.hermes/skills/gstack-*/` |\n| GBrain (mod) | `--host gbrain` | `~/.gbrain/skills/gstack-*/` |\n\n**Want to add support for another agent?** See [docs/ADDING_A_HOST.md](docs/ADDING_A_HOST.md).\nIt's one TypeScript config file, zero code changes.",

        "type": "ultimate",
        "installBody": "Installation differs by harness. If you use more than one, install Superpowers separately for each one.\n\n### Claude Code\n\nSuperpowers is available via the [official Claude plugin marketplace](https://claude.com/plugins/superpowers)\n\n#### Official Marketplace\n\n- Install the plugin from Anthropic's official marketplace:\n\n  ```bash\n  /plugin install superpowers@claude-plugins-official\n  ```\n\n#### Superpowers Marketplace\n\nThe Superpowers marketplace provides Superpowers and some other related plugins for Claude Code.\n\n- Register the marketplace:\n\n  ```bash\n  /plugin marketplace add obra/superpowers-marketplace\n  ```\n\n- Install the plugin from this marketplace:\n\n  ```bash\n  /plugin install superpowers@superpowers-marketplace\n  ```\n\n### Codex CLI\n\nSuperpowers is available via the [official Codex plugin marketplace](https://github.com/openai/plugins).\n\n- Open the plugin search interface:\n\n  ```bash\n  /plugins\n  ```\n\n- Search for Superpowers:\n\n  ```bash\n  superpowers\n  ```\n\n- Select `Install Plugin`.\n\n### Codex App\n\nSuperpowers is available via the [official Codex plugin marketplace](https://github.com/openai/plugins).\n\n- In the Codex app, click on Plugins in the sidebar.\n- You should see `Superpowers` in the Coding section.\n- Click the `+` next to Superpowers and follow the prompts.\n\n### Factory Droid\n\n- Register the marketplace:\n\n  ```bash\n  droid plugin marketplace add https://github.com/obra/superpowers\n  ```\n\n- Install the plugin:\n\n  ```bash\n  droid plugin install superpowers@superpowers\n  ```\n\n### Gemini CLI\n\n- Install the extension:\n\n  ```bash\n  gemini extensions install https://github.com/obra/superpowers\n  ```\n\n- Update later:\n\n  ```bash\n  gemini extensions update superpowers\n  ```\n\n### OpenCode\n\nOpenCode uses its own plugin install; install Superpowers separately even if you\nalready use it in another harness.\n\n- Tell OpenCode:\n\n  ```\n  Fetch and follow instructions from https://raw.githubusercontent.com/obra/superpowers/refs/heads/main/.opencode/INSTALL.md\n  ```\n\n- Detailed docs: [docs/README.opencode.md](docs/README.opencode.md)\n\n### Cursor\n\n- In Cursor Agent chat, install from marketplace:\n\n  ```bash\n  /add-plugin superpowers\n  ```\n\n- Or search for \"superpowers\" in the plugin marketplace.\n\n### GitHub Copilot CLI\n\n- Register the marketplace:\n\n  ```bash\n  copilot plugin marketplace add obra/superpowers-marketplace\n  ```\n\n- Install the plugin:\n\n  ```bash\n  copilot plugin install superpowers@superpowers-marketplace\n  ```",

      "id": "langgenius/backend-code-review",
      "name": "Backend Code Review",
      "contributor": "langgenius",
      "origin": false,
      "genericSkillRef": "code-review-pipeline",
      "status": "awakened",
      "level": "2★",
      "description": "Review backend code for quality, security, maintainability, and best practices based on established checklist rules.",
      "links": {
        "github": "https://github.com/langgenius/dify/blob/main/.agents/skills/backend-code-review/SKILL.md"
      },
      "createdAt": "2026-05-31",
      "updatedAt": "2026-06-04",
      "timeline": [
        {
          "timestamp": "2026-05-31T02:06:53Z",
          "action": "add",
          "contributor": "unknown",
          "details": "Added named skill langgenius/backend-code-review"
        }
      ],
      "type": "extra",
      "installBody": "No additional setup required. This skill is built into the Dify agent framework.\n\n### Prerequisites\n\n- Access to backend code files in the `api/` directory\n- Python files (`.py` extension) for review\n- Optional: Git staging area for pending changes to review\n\n### How to Use\n\n**Request a code review** by asking the agent to analyze backend code:\n\n```\n\"Review this Python function for security issues\"\n\"Analyze api/app.py for best practices\"\n\"Check my pending changes for quality concerns\"\n```\n\n**Review Modes:**\n\n1. **Pending-Change Review** — Agent inspects staged/working-tree files ready for commit\n2. **Code Snippet Review** — Paste function, class, or module excerpts directly\n3. **File-Focused Review** — Reference specific backend files (e.g., `api/models/user.py`)\n\n### What Gets Checked\n\n- Database schema design (`api/models/`, `api/migrations/`)\n- Architecture patterns (layering, dependency flow)\n- Repository abstraction (CRUD operations)\n- SQLAlchemy patterns (sessions, transactions)\n- General best practices if no specific checklist matches\n\n### Output Format\n\nReviews are categorized as:\n- 🔴 **Critical** (must fix)\n- 🟡 **Suggestions** (should consider)\n- 🟢 **Nits** (optional improvements)\n\nEach finding includes file path, line numbers, explanation, and actionable code fix."
    },
    {
      "id": "langgenius/component-refactoring",
      "name": "Component Refactoring",
      "contributor": "langgenius",
      "origin": false,
      "genericSkillRef": "refactor-code",
      "status": "awakened",
      "level": "2★",
      "description": "Refactor high-complexity React components in Dify frontend.",
      "links": {
        "github": "https://github.com/langgenius/dify/blob/main/.agents/skills/component-refactoring/SKILL.md"
      },
      "createdAt": "2026-05-31",
      "updatedAt": "2026-06-04",
      "timeline": [
        {
          "timestamp": "2026-05-31T02:07:12Z",
          "action": "add",
          "contributor": "unknown",
          "details": "Added named skill langgenius/component-refactoring"
        }
      ],
      "type": "basic",
      "installBody": "No additional setup required. This skill uses Dify's existing frontend toolchain.\n\n### Prerequisites\n\n- Access to Dify frontend codebase (`web/` directory)\n- Node.js environment with `pnpm` package manager\n- Basic understanding of React hooks and component architecture\n\n### Quick Start\n\nNavigate to the web directory and verify component metrics:\n\n```bash\ncd web\npnpm analyze-component &lt;path&gt;\npnpm analyze-component &lt;path&gt; --json\n```\n\n### How to Use\n\n**Request refactoring analysis** when you have high-complexity components:\n\n```bash\npnpm refactor-component &lt;path&gt;\npnpm refactor-component &lt;path&gt; --json\n```\n\nThe `--json` flag outputs structured data for programmatic use.\n\n### Complexity Thresholds\n\n| Score | Status | Recommendation |\n|-------|--------|-----------------|\n| 0-25 | ✅ Simple | Ready to test |\n| 26-50 | ⚠️ Medium | Minor refactoring optional |\n| 51-75 | ⛔ Complex | Refactor before testing |\n| 76-100 | ⛔ Critical | Must refactor |\n\n**Apply refactoring when:**\n- Complexity score exceeds 50 (on a 0-100 scale)\n- Line count surpasses 300\n- Users request code splitting or hook extraction\n- Tools warn to refactor before testing"
    },
    {
      "id": "langgenius/e2e-cucumber-playwright",
      "name": "E2E Cucumber Playwright",
      "contributor": "langgenius",
      "origin": false,
      "genericSkillRef": "e2e-testing",
      "status": "awakened",
      "level": "2★",
      "description": "Write, update, or review Dify end-to-end tests under e2e/ that use Cucumber, Gherkin, and Playwright.",
      "links": {
        "github": "https://github.com/langgenius/dify/blob/main/.agents/skills/e2e-cucumber-playwright/SKILL.md"
      },
      "createdAt": "2026-05-31",
      "updatedAt": "2026-06-04",
      "timeline": [
        {
          "timestamp": "2026-05-31T02:07:01Z",
          "action": "add",
          "contributor": "unknown",
          "details": "Added named skill langgenius/e2e-cucumber-playwright"
        }
      ],
      "type": "extra",
      "installBody": "No additional setup required beyond accessing the Dify E2E test suite.\n\n### Prerequisites\n\n- Access to the Dify repository\n- Node.js and pnpm installed\n- Familiarity with Cucumber, Gherkin syntax, and Playwright\n\n### Validation\n\nValidate your E2E test configuration and changes:\n\n```bash\npnpm -C e2e check\n```\n\n### How to Use\n\n**Start here:** Read `e2e/AGENTS.md` for the canonical guide on local architecture and conventions.\n\n**Then examine these files in order:**\n\n1. Target `.feature` files under `e2e/features/`\n2. Related step definitions in `e2e/features/step-definitions/`\n3. Session and state files: `hooks.ts` and `world.ts` (if lifecycle matters)\n4. Execution config: `run-cucumber.ts` and `cucumber.config.ts` (if tags or flow matter)\n\n### Writing Scenarios\n\n- Use Behavior-Driven Development (BDD) syntax with Given-When-Then structure\n- Reuse existing step definitions when possible\n- Prefer user-facing locators over implementation details\n- Validate narrowly before broadening verification\n- Reference Playwright best practices for locators, assertions, and waiting strategies\n\n### Key Principles\n\n- Keep scenarios readable and business-focused\n- Maintain step definition reusability\n- Test user workflows, not implementation details\n- Use Cucumber best practices for scenario wording and step design"
    },

      "type": "extra",
      "installBody": "No additional setup required. This skill integrates with Dify's review framework.\n\n### Prerequisites\n\n- Access to frontend source files (`.tsx`, `.ts`, `.js`)\n- Reference documentation at `references/code-quality.md`, `references/performance.md`, and `references/business-logic.md`\n- A code editor or repository with staged/working changes visible\n\n### How to Use\n\n**Request a frontend code review:**\n\n```\n\"Review my frontend code\"\n\"Check this .tsx file for issues\"\n\"Review my pending changes\"\n```\n\n### Review Modes\n\n1. **Pending-change review** — Analyze staged or working-tree files ready for commit\n2. **File-targeted review** — Review specific files you name\n\n### What Gets Checked\n\nThe agent examines:\n- Component/module structure and class names\n- React hooks and prop memoization\n- Styling consistency and organization\n- Cross-referenced against three categories:\n  - **Code Quality** — best practices, readability\n  - **Performance** — bundle size, rendering efficiency\n  - **Business Logic** — requirements compliance\n\n### Output Format\n\nIssues are organized by:\n1. **Urgency** (critical, suggestions, nits)\n2. **Category** (quality, performance, business logic)\n3. **Details** (code snippets and fix suggestions)\n\nMaximum 10 findings per category; excess results summarize as \"10+\""

      "type": "extra",
      "installBody": "No additional setup required. Vitest and React Testing Library are pre-configured in Dify.\n\n### Prerequisites\n\n- Node.js and pnpm package manager\n- Access to the Dify repository\n- Familiarity with React and TypeScript\n\n### Quick Start\n\nThe test infrastructure is pre-configured in your Dify workspace:\n\n- **Test runner**: Vitest (configured in `web/vite.config.ts`)\n- **Testing library**: React Testing Library\n- **Setup file**: `web/vitest.setup.ts` (includes global mocks)\n\n### Core Commands\n\nRun from the `web/` directory. From repo root, prefix with `pnpm -C web`:\n\n```bash\n# Execute all tests\npnpm test\n\n# Watch mode for active development\npnpm test --watch\n\n# Run a specific test file\npnpm test path/to/file.spec.tsx\n\n# Generate coverage report\npnpm test --coverage\n\n# Analyze component complexity before testing\npnpm analyze-component &lt;path&gt;\n```\n\n### How to Use This Skill\n\n**Apply when you:**\n- Write or review frontend component/hook/utility tests\n- Work with Vitest, React Testing Library, or spec files\n- Improve test coverage\n- Follow testing patterns in Dify\n\n**Do NOT apply for:**\n- Backend/Python tests\n- E2E tests (Cucumber + Playwright)\n- Conceptual questions without code\n\n### Key Resource\n\nRefer to `web/docs/test.md` for complete specifications and patterns."

  <script>
    window.document.title = "mbtiongson1/gaia-skill-tree - Gaia Skill Graph";
    
    // Mock fetch
    const originalFetch = window.fetch;
    window.fetch = async function(resource, options) {
      const url = typeof resource === 'string' ? resource : resource.url;
      if (url.includes('graph/ping.json')) {
        return new Response(JSON.stringify({ ok: true }), { status: 200, headers: { 'Content-Type': 'application/json' } });
      }
      if (url.includes('graph/gaia.json')) {
        const data = document.getElementById('gaia-graph-data').textContent;
        return new Response(data, { status: 200, headers: { 'Content-Type': 'application/json' } });
      }
      if (url.includes('named/index.json')) {
        const data = document.getElementById('gaia-named-skills').textContent;
        return new Response(data, { status: 200, headers: { 'Content-Type': 'application/json' } });
      }
      return originalFetch(resource, options);
    };
  </script>
